<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5 + MathJax LaTeX</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #051020;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.9/lib/p5.min.js"></script>
    <script>
      MathJax = {
        startup: { typeset: false },
        svg: { fontCache: "local" }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js"></script>
  </head>
  <body>
    <script src="libraries/mathtex.js"></script>
    <script src="libraries/equation.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
